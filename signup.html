<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhythm4U</title>

  <link rel="stylesheet" type="text/css" href="css/login.css">

</head>
<body>

    <div class="login-container">
        <div class="login-card">
          <button onclick="history.back()" class="back-btn">← Back</button>
            <div class="login-header">
                <h2>Create an account to enjoy</h2>
                <h2 style="font-family:Brush Script MT">Rhythm4U</h2>
                <p>Create account</p>
            </div>

        <form class="login-form" id="loginForm" action="homepage.html" method="GET">
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" required autocomplete="email">
                    <label for="email">Email Address</label>
                    <span class="focus-border"></span>
                </div>
                    <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
                <div class="input-wrapper password-wrapper">
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                    <label for="password">Password</label>
                    <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                        <span class="eye-icon"></span>
                    </button>
                        <span class="focus-border"></span>
                </div>
                    <span class="error-message" id="passwordError"></span>
            </div>

            <div class="form-group">
                 <div class="input-wrapper password-wrapper">
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                    <label for="password">Repeat Password</label>
                    <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                        <span class="eye-icon"></span>
                    </button>
                        <span class="focus-border"></span>
                </div>
                        <span class="error-message" id="passwordError"></span>
            </div>

            <div class="form-options">
                <label class="remember-wrapper">
                    <input type="checkbox" id="remember" name="remember">
                    <span class="checkbox-label">
                        <span class="checkmark"></span>
                        Remember me
                    </span>
                </label>
            </div>

            <button type="submit" class="login-btn btn">
                        <span class="btn-text">Sign Up</span>
                        <span class="btn-loader"></span>
            </button>

                </form> 
                <div class="signup-link">
                    <p>By creating an account you agree to our 
                    <a href="termandprivacy.html" style="color:dodgerblue">Terms & Privacy</a>
                    </p>
                </div>
        </div> 
    </div> 
</body>
</html>
