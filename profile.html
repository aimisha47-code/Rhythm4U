<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile</title>

  <link rel="stylesheet" href="css/profile.css">
</head>

<body>
<nav class="top-nav">
    <div class="nav-left">
        <a href="homepage.html" id="backBtn" class="back-btn">← Back</a>
    </div>

    <div class="nav-center">
        <a href="artist.html">Artist</a>
        <a href="review.html">Review</a>
        <a href="playlist.html">Playlist</a>
    </div>

    <div class="nav-right">
        <a href="favourite.html" class="heart-btn">❤️</a>
    </div>
</nav>

<div class="profile-bg-container" id="bg-display" style="background-image: url('image/background_pic.jpeg');">
        <div class="bg-overlay"></div>
        <input type="file" id="bg-upload" hidden accept="image/*">
        <button class="edit-bg-btn" onclick="document.getElementById('bg-upload').click()">
            📷 Change Cover
        </button>
    </div>

    <div class="profile-hero">
        <div class="pfp-wrapper">
            <img src="image/pp2.jpg" id="pfp-display" alt="Profile">
            <input type="file" id="pfp-upload" hidden accept="image/*">
            <button class="edit-pfp-btn" onclick="document.getElementById('pfp-upload').click()">✎</button>
        </div>
        <h1 class="nickname">Hi Alisha,</h1>
        <p class="quote">"Time to get lost in the soul. Peace is found in the rhythm."</p>
    </div>

    <div class="settings-container">
        <div class="input-group">
            <label>Name</label>
            <input type="text" placeholder="Aimi Alisha">
        </div>
        <div class="input-group">
            <label>Address</label>
            <input type="text" placeholder="Kuala Lumpur, Malaysia">
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" value="alisha@gmail.com" readonly>
        </div>
        <div class="input-group">
            <label>New Password</label>
            <input type="password" placeholder="••••••••">
        </div>
        <button class="save-btn">Save Profile</button>
    </div>

 <nav class="bottom-nav">
    <a href="homepage.html" class="nav-item">⌂ <span>Home</span></a>
    <a href="profile.html" class="nav-item">👤 <span>Profile</span></a>
    <a href="setting.html" class="nav-item">⚙ <span>Settings</span></a>
</nav>

<script >
    function setupImageUpload(inputId, displayId, isBackground) {
    const input = document.getElementById(inputId);
    const display = document.getElementById(displayId);

    input.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                if (isBackground) {
                    display.style.backgroundImage = `url('${e.target.result}')`;
                } else {
                    display.src = e.target.result;
                }
            }
            reader.readAsDataURL(file);
        }
    });
}
setupImageUpload('pfp-upload', 'pfp-display', false);
setupImageUpload('bg-upload', 'bg-display', true);
</script>

</body>
</html>
